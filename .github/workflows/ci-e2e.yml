name: E2E Tests

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or ref to run e2e against'
        required: false
        default: ''

jobs:
  check-changes:
    name: Check web module changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      web_changed: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            web:
              - 'knowledge-graph-web/**'

  e2e:
    name: e2e (chromium)
    needs: check-changes
    # Runs when (a) paths-filter detected web changes, OR (b) the workflow was
    # manually dispatched from the Actions UI — useful for smoke-testing a PR
    # whose diff doesn't touch knowledge-graph-web/** but may still affect the
    # web runtime via lockfile / shared deps.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (needs.check-changes.result == 'success' && needs.check-changes.outputs.web_changed == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-knowledge-graph-web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: knowledge-graph-web

      - name: Install backend dependencies
        run: npm ci
        working-directory: knowledge-graph

      - name: Build backend
        run: npm run build
        working-directory: knowledge-graph

      - name: Analyze repository (index for backend)
        run: |
          node knowledge-graph/dist/cli/index.js analyze || true
          if [ ! -d ".knowledge-graph" ]; then
            echo "::error::No .knowledge-graph index created"
            exit 1
          fi

      - name: Start backend server
        run: node dist/cli/index.js serve &
        working-directory: knowledge-graph

      - name: Wait for backend readiness
        run: npx wait-on http://localhost:4747/api/repos --timeout 30000
        working-directory: knowledge-graph-web

      - name: Start Vite dev server
        run: npm run dev &
        working-directory: knowledge-graph-web

      - name: Wait for Vite dev server
        run: npx wait-on http://localhost:5173 --timeout 30000
        working-directory: knowledge-graph-web

      - name: Run E2E tests
        run: npx playwright test
        working-directory: knowledge-graph-web
        env:
          E2E: '1'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-results
          path: |
            knowledge-graph-web/test-results/
            knowledge-graph-web/playwright-report/
          retention-days: 5
