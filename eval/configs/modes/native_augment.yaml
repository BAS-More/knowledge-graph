# Native + Augment mode — the primary evaluation mode
#
# Combines two capabilities (mirroring the Claude Code model):
# 1. Explicit Knowledge-Graph tools: knowledge-graph-query, knowledge-graph-context, knowledge-graph-impact, knowledge-graph-cypher
#    Available as fast bash commands (~100ms via eval-server)
# 2. Automatic grep enrichment: grep/rg results are transparently augmented with
#    [Knowledge-Graph] annotations showing callers, callees, and execution flows
#
# The agent decides when to use explicit tools vs rely on enriched grep results.
agent:
  agent_class: 'eval.agents.knowledge-graph_agent.Knowledge-GraphAgent'
  knowledge-graph_mode: 'native_augment'
  step_limit: 30
  cost_limit: 3.0
  augment_timeout: 5.0
  augment_min_pattern_length: 3
  track_knowledge-graph_usage: true

environment:
  environment_class: 'eval.environments.knowledge-graph_docker.Knowledge-GraphDockerEnvironment'
  enable_knowledge-graph: true
  skip_embeddings: true
  knowledge-graph_timeout: 120
  eval_server_port: 4848
