# Native mode — Knowledge-Graph tools only, no grep enrichment
#
# Explicit tools: knowledge-graph-query, knowledge-graph-context, knowledge-graph-impact, knowledge-graph-cypher
# Available as fast bash commands (~100ms via eval-server)
#
# Use this mode to isolate the value of explicit tools without grep augmentation.
agent:
  agent_class: 'eval.agents.knowledge-graph_agent.Knowledge-GraphAgent'
  knowledge-graph_mode: 'native'
  step_limit: 30
  cost_limit: 3.0
  track_knowledge-graph_usage: true

environment:
  environment_class: 'eval.environments.knowledge-graph_docker.Knowledge-GraphDockerEnvironment'
  enable_knowledge-graph: true
  skip_embeddings: true
  knowledge-graph_timeout: 120
  eval_server_port: 4848
